name: News Collection Cron

on:
  schedule:
    # 30분마다 (UTC 기준이지만 30분 간격은 시간대 무관)
    - cron: "*/30 * * * *"
  workflow_dispatch: # 수동 트리거 허용

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/collect
        run: |
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_URL }}/api/cron/collect"
